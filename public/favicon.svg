<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#facc15;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e879f9;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#grad)" stroke="#1a1a2e" stroke-width="2"/>
  
  <!-- Truck body -->
  <rect x="20" y="55" width="45" height="15" rx="3" fill="#1a1a2e"/>
  <rect x="65" y="55" width="15" height="15" rx="3" fill="#1a1a2e"/>
  
  <!-- Truck cabin -->
  <path d="M15 55 L15 40 Q15 35 20 35 L40 35 L45 55 Z" fill="#1a1a2e"/>
  
  <!-- Windshield -->
  <path d="M22 42 L22 52 L38 52 L35 42 Z" fill="#facc15" opacity="0.8"/>
  
  <!-- Wheels -->
  <circle cx="32" cy="70" r="8" fill="#1a1a2e"/>
  <circle cx="32" cy="70" r="4" fill="#e879f9"/>
  <circle cx="55" cy="70" r="8" fill="#1a1a2e"/>
  <circle cx="55" cy="70" r="4" fill="#e879f9"/>
  <circle cx="72" cy="70" r="8" fill="#1a1a2e"/>
  <circle cx="72" cy="70" r="4" fill="#e879f9"/>
  
  <!-- Headlight -->
  <circle cx="16" cy="50" r="3" fill="#facc15"/>
  
  <!-- GPS Signal -->
  <path d="M78 30 L82 25 M82 25 L86 30 M82 25 L82 35" stroke="#facc15" stroke-width="2" fill="none"/>
  
  <!-- Speed lines -->
  <line x1="60" y1="45" x2="75" y2="45" stroke="#facc15" stroke-width="1.5" opacity="0.6"/>
  <line x1="58" y1="50" x2="70" y2="50" stroke="#facc15" stroke-width="1.5" opacity="0.4"/>
</svg>